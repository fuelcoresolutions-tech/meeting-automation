[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "/bin/sh -c 'exec /app/start-railway.sh'"
healthcheckPath = "/health"
healthcheckTimeout = 300
numReplicas = 1
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Claude Agent SDK needs at least 2GB RAM
[deploy.resources]
memory = "2GB"
cpu = 1

# Environment variables for Railway
[deploy.env]
NODE_ENV = "production"
ENABLE_IMMEDIATE_PROCESSING = "true"
ENABLE_DURABLE_RETRY_WORKER = "true"
RETRY_POLL_SECONDS = "10"
MAX_RETRY_ATTEMPTS = "50"
LOG_LEVEL = "info"
